spring.application.name=user-management

# postgres Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/connectix}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin@123}

# Ensure SQL initialization runs and runs after JPA schema creation
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Run on alternate port to avoid conflicts during development
server.port=${SERVER_PORT:8081}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

# Logging
logging.level.com.example.usermanagement=${APP_LOG_LEVEL:DEBUG}

# JWT configuration
jwt.secret=${JWT_SECRET:gA#8pLm9!qZ2*vN4vY7@bX1&cW5%sK3j}
jwt.expiration=${JWT_EXPIRATION:86400000}
