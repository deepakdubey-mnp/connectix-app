version: '3.8'
services:
  db:
    image: postgres:16
    container_name: conectix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: conectix
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pwd
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data


volumes:
  pg_data:
