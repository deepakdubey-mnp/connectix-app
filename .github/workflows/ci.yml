name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - feature/manish/develop
  push:
    branches:
      - main
      - master
      - develop
      - feature/manish/develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build and run tests
        run: ./gradlew clean build --no-daemon
